name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read
  code-quality: write

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run unit tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tests/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run tests with coverage
        run: pytest -q --cov=. --cov-report=xml:coverage.xml

      - name: Gzip coverage file
        run: gzip -f coverage.xml

      - name: Upload gzipped coverage report
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage.xml.gz
          language: python
          label: pytest
          fail-on-error: false
